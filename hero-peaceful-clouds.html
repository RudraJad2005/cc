<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaceful Concept - Midnight Clouds V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-bg: rgba(10, 10, 12, 0.4);
            --ui-border: rgba(255, 255, 255, 0.06);
            --ui-border-hover: rgba(255, 255, 255, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
        }

        /* The Cinematic Sky Layer */
        .sky-bg {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            /* High-res dark clouds */
            background-image: url('bg-clouds.png');
            background-size: cover;
            background-position: center;
            filter: grayscale(80%) brightness(0.3) contrast(1.1);
            animation: drift 120s linear infinite alternate;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(-3%, -2%, 0) scale(1.05); }
        }

        /* Film Grain Overlay */
        .grain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            z-index: 1;
            pointer-events: none;
        }

        /* Vignette to focus attention center */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, #000 120%);
            z-index: 2;
            pointer-events: none;
        }

        /* Main Content Wrapper */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25vh;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        h1 {
            font-size: 2.75rem;
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 2.5rem;
            letter-spacing: -0.03em;
            text-align: center;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 strong { font-weight: 500; }

        /* Premium Glassmorphism Prompt Box */
        .prompt-wrapper {
            width: 100%;
            background: var(--ui-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--ui-border);
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            margin-bottom: 2.5rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden; /* For inner glow */
            position: relative;
        }

        .prompt-wrapper:focus-within {
            border-color: var(--ui-border-hover);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Top Tabs */
        .prompt-tabs {
            display: flex;
            border-bottom: 1px solid var(--ui-border);
            background: rgba(0,0,0,0.2);
        }

        .tab {
            padding: 1rem 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            position: relative;
        }

        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--text-main); }
        
        /* Active Tab Indicator */
        .tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 -2px 10px rgba(255,255,255,0.5);
        }

        .prompt-inner {
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
        }

        .prompt-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.15rem;
            font-family: inherit;
            line-height: 1.6;
            outline: none;
            resize: none;
            height: 80px;
            margin-bottom: 1rem;
        }

        .prompt-input::placeholder { color: #555; font-weight: 300; }

        .prompt-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tools { display: flex; gap: 8px; }

        .tool-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--ui-border);
            color: var(--text-muted);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px;
            cursor: pointer; transition: all 0.2s;
        }

        .tool-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-main); }

        .submit-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(255,255,255,0.2);
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255,255,255,0.3); }

        /* Suggestions area */
        .suggestions-header {
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 12px;
            width: 100%; justify-content: center;
        }

        .suggestions-header::before, .suggestions-header::after {
            content: ''; height: 1px; width: 30px; background: rgba(255,255,255,0.1);
        }

        .suggestions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestion-pill {
            background: rgba(15, 15, 15, 0.4);
            border: 1px solid var(--ui-border);
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggestion-pill:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Subtle glowing dots in pills */
        .dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
        .dot-1 { color: #f43f5e; background: #f43f5e; }
        .dot-2 { color: #10b981; background: #10b981; }
        .dot-3 { color: #8b5cf6; background: #8b5cf6; }

    </style>
</head>
<body>

    <div class="sky-bg"></div>
    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="content">
        <h1>Start with one prompt. <strong>Change everything later.</strong></h1>

        <div class="prompt-wrapper">
            <div class="prompt-tabs">
                <div class="tab active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    Web App
                </div>
                <div class="tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                    Mobile App
                </div>
            </div>
            
            <div class="prompt-inner">
                <textarea class="prompt-input" placeholder="Describe your idea... we'll bring it to life."></textarea>
                
                <div class="prompt-footer">
                    <div class="tools">
                        <button class="tool-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                            Attach
                        </button>
                    </div>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <button class="tool-btn" style="border: none; background: transparent; padding: 6px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <button class="submit-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="suggestions-header">Not sure where to start? Try these</div>
        
        <div class="suggestions">
            <div class="suggestion-pill"><div class="dot dot-1"></div> Loyalty punch card for a coffee shop</div>
            <div class="suggestion-pill"><div class="dot dot-2"></div> CRM dashboard for a hair salon</div>
            <div class="suggestion-pill"><div class="dot dot-3"></div> Crypto portfolio tracking app</div>
        </div>
    </div>

</body>
</html>
